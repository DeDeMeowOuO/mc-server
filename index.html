<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft 伺服器狀態 & 物品市場</title>
<style>
:root {
--bg-color: #1e1e2e;
--card-bg: #252538;
--text-color: #cdd6f4;
--text-muted: #a6adc8;
--online-color: #a6e3a1;
--offline-color: #f38ba8;
--select-bg: #181825;
--accent-color: #cba6f7; /* 浪漫紫 */
--gold-color: #f9e2af; /* 金幣黃 */
}
body {
font-family: 'Segoe UI', system-ui, sans-serif;
background-color: var(--bg-color);
color: var(--text-color);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
min-height: 100vh;
margin: 0;
padding: 20px;
box-sizing: border-box;
}
.container {
display: flex;
flex-direction: column;
gap: 20px;
width: 100%;
max-width: 420px;
}
.card {
background-color: var(--card-bg);
padding: 25px;
border-radius: 16px;
box-shadow: 0 10px 30px rgba(0,0,0,0.4);
text-align: center;
border: 1px solid #313244;
}
h2 {
margin-top: 0;
font-size: 1.5rem;
letter-spacing: 1px;
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
}
.ip-badge {
background: #11111b;
padding: 6px 12px;
border-radius: 20px;
font-family: monospace;
font-size: 0.95rem;
color: var(--text-muted);
display: inline-block;
margin-bottom: 15px;
}
.status {
font-size: 1.05rem;
padding: 10px;
border-radius: 8px;
font-weight: bold;
margin-bottom: 15px;
transition: all 0.3s ease;
}
.online { background-color: rgba(166, 227, 161, 0.2); color: var(--online-color); border: 1px solid var(--online-color); }
.offline { background-color: rgba(243, 139, 168, 0.2); color: var(--offline-color); border: 1px solid var(--offline-color); }
.loading { background-color: rgba(250, 179, 135, 0.2); color: #fab387; border: 1px solid #fab387; }

.info-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 12px;
margin-top: 15px;
text-align: left;
}
.info-item { background: #181825; padding: 12px; border-radius: 8px; }
.info-label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 3px; }
.info-value { font-size: 1.05rem; font-weight: bold; }

.motd {
margin-top: 12px;
font-size: 0.85rem;
background: #181825;
padding: 10px;
border-radius: 8px;
color: #f5e0dc;
word-break: break-all;
}

.dropdown-container { margin-top: 12px; text-align: left; }
.dropdown-label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; display: block; }
.player-dropdown {
width: 100%; padding: 10px; background-color: var(--select-bg); color: var(--text-color);
border: 1px solid #313244; border-radius: 8px; font-size: 0.9rem; font-family: monospace;
cursor: pointer; outline: none; box-sizing: border-box;
}

/* 🆕 物品市場專屬樣式 */
.market-list {
display: flex;
flex-direction: column;
gap: 10px;
margin-top: 15px;
}
.market-item {
display: flex;
align-items: center;
background: #181825;
padding: 12px;
border-radius: 10px;
border: 1px solid transparent;
transition: border-color 0.2s;
}
.market-item:hover {
border-color: #45475a;
}
.item-icon {
font-size: 2rem;
margin-right: 12px;
background: #1e1e2e;
padding: 6px;
border-radius: 8px;
width: 40px;
height: 40px;
display: flex;
align-items: center;
justify-content: center;
}
.item-details {
flex-grow: 1;
text-align: left;
}
.item-name {
font-weight: bold;
font-size: 0.95rem;
color: #f5e0dc;
}
.item-desc {
font-size: 0.75rem;
color: var(--text-muted);
margin-top: 2px;
}
.item-action {
text-align: right;
}
.item-price {
font-size: 0.9rem;
font-weight: bold;
color: var(--gold-color);
margin-bottom: 5px;
font-family: monospace;
}
.buy-btn {
background: var(--accent-color);
color: #11111b;
border: none;
padding: 5px 10px;
border-radius: 6px;
font-size: 0.75rem;
font-weight: bold;
cursor: pointer;
transition: opacity 0.2s;
}
.buy-btn:hover { opacity: 0.9; }

/* 提示通知（複製指令用） */
.toast {
position: fixed;
bottom: 20px;
background: #a6e3a1;
color: #11111b;
padding: 10px 20px;
border-radius: 30px;
font-size: 0.9rem;
font-weight: bold;
box-shadow: 0 4px 15px rgba(0,0,0,0.3);
display: none;
z-index: 100;
}
</style>
</head>
<body>

<div class="container">
<div class="card">
<h2>🔮 伺服器狀態監控</h2>
<div id="server-ip" class="ip-badge">載入中...</div>
<div id="status-badge" class="status loading">正在連線至 API...</div>

<div id="info-panel" style="display: none;">
<div class="info-grid">
<div class="info-item">
<div class="info-label">遊戲版本</div>
<div id="version" class="info-value">-</div>
</div>
<div class="info-item">
<div class="info-label">在線人數</div>
<div id="players" class="info-value">-</div>
</div>
</div>
<div id="motd" class="motd"></div>

<div class="dropdown-container">
<label class="dropdown-label" for="player-select">👥 線上玩家名單</label>
<select id="player-select" class="player-dropdown">
<option>正在獲取名單...</option>
</select>
</div>
</div>
</div>

<div class="card">
<h2>🛒 伺服器物資市場</h2>
<div class="market-list">

<div class="market-item">
<div class="item-icon">⚔️</div>
<div class="item-details">
<div class="item-name">龍之呼吸神劍</div>
<div class="item-desc">鋒利 V、擊退 II、火焰附加 II</div>
</div>
<div class="item-action">
<div class="item-price">500 點</div>
<button class="buy-btn">複製指令</button>
</div>
</div>

<div class="market-item">
<div class="item-icon">🔱</div>
<div class="item-details">
<div class="item-name">海神三叉戟</div>
<div class="item-desc">忠誠 III、引雷 I、耐久 III</div>
</div>
<div class="item-action">
<div class="item-price">350 點</div>
<button class="buy-btn">複製指令</button>
</div>
</div>

<div class="market-item">
<div class="item-icon">💎</div>
<div class="item-details">
<div class="item-name">新手資源禮包</div>
<div class="item-desc">內含 鑽石x64、金錠x64、牛排x64</div>
</div>
<div class="item-action">
<div class="item-price">100 點</div>
<button class="buy-btn">複製指令</button>
</div>
</div>

</div>
</div>
</div>

<div id="toast" class="toast">📋 已複製購買指令，回遊戲貼上即可！</div>

<script>
const SERVER_IP = 'gemcsv.ddns.net';
document.getElementById('server-ip').innerText = SERVER_IP;

// 🆕 點擊按鈕複製指令到剪貼簿
function copyCommand(cmd) {
navigator.clipboard.writeText(cmd).then(() => {
const toast = document.getElementById('toast');
toast.style.display = 'block';
setTimeout(() => { toast.style.display = 'none'; }, 2500);
}).catch(err => {
alert('複製失敗，請手動輸入：' + cmd);
});
}

async function updateStatus() {
const badge = document.getElementById('status-badge');
const panel = document.getElementById('info-panel');
const dropdown = document.getElementById('player-select');

try {
const response = await fetch(`https://api.mcsrvstat.us/2/${SERVER_IP}`);
const data = await response.json();

if (data.online) {
badge.innerText = "● 伺服器線上 (Online)";
badge.className = "status online";
document.getElementById('version').innerText = data.version || '未知';
document.getElementById('players').innerText = `${data.players.online} / ${data.players.max}`;

if(data.motd && data.motd.clean) {
document.getElementById('motd').innerText = data.motd.clean.join('\n');
document.getElementById('motd').style.display = 'block';
} else {
document.getElementById('motd').style.display = 'none';
}

dropdown.innerHTML = '';
if (data.players.list && data.players.list.length > 0) {
const defaultOpt = document.createElement('option');
defaultOpt.text = `點擊查看名單 (${data.players.online} 人在線)`;
defaultOpt.disabled = true;
defaultOpt.selected = true;
dropdown.add(defaultOpt);

data.players.list.forEach(player => {
const opt = document.createElement('option');
opt.value = player;
opt.text = player;
dropdown.add(opt);
});
} else {
const noPlayerOpt = document.createElement('option');
noPlayerOpt.text = "目前無玩家在線 (或未開啟 Query)";
noPlayerOpt.disabled = true;
dropdown.add(noPlayerOpt);
}

panel.style.display = 'block';
} else {
badge.innerText = "○ 伺服器離線 (Offline)";
badge.className = "status offline";
panel.style.display = 'none';
}
} catch (error) {
badge.innerText = "❌ 偵測失敗 (API 連線錯誤)";
badge.className = "status offline";
console.error(error);
}
}

updateStatus();
setInterval(updateStatus, 30000);
</script>
</body>
</html>
